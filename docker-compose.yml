services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: oidc_node_app
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - pnpm-store:/pnpm/store
      - /app/node_modules
    environment:
      DATABASE_URL: postgres://admin:admin@postgres:5432/oidc_auth
    depends_on:
      - postgres
    command: tail -f /dev/null

  postgres:
    image: postgres:17
    container_name: oidc_postgres_db
    restart: unless-stopped
    ports:
      - "5444:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: oidc_auth
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
  pnpm-store: